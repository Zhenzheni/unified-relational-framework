name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'sims/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site

          # Landing page with both sims
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Unified Relational Framework</title>
            <style>
              :root { --bg:#05070a; --ink:#eef1f6; --muted:#5c6675; --amber:#eab054; --teal:#3f93ab; --line:#1a2029; }
              * { box-sizing: border-box; }
              body { margin:0; min-height:100vh; background:var(--bg); color:var(--ink);
                     font-family: system-ui, -apple-system, Segoe UI, sans-serif;
                     display:flex; flex-direction:column; align-items:center; justify-content:center;
                     padding:2rem; text-align:center; }
              h1 { font-size:1.6rem; font-weight:700; margin:0 0 0.4rem; letter-spacing:-0.02em; }
              h1 span { color:var(--amber); }
              p { color:var(--muted); max-width:36rem; line-height:1.55; margin:0 0 1.75rem; }
              .btns { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
              a.btn { display:inline-block; padding:0.75rem 1.35rem; border:1px solid var(--amber);
                      color:var(--amber); text-decoration:none; border-radius:999px; font-size:0.95rem; }
              a.btn.secondary { border-color:var(--teal); color:var(--teal); }
              a.btn:hover { background:rgba(234,176,84,0.12); }
              a.btn.secondary:hover { background:rgba(63,147,171,0.12); }
              .meta { margin-top:2rem; font-size:0.8rem; color:var(--muted); }
              .meta a { color:var(--ink); }
            </style>
          </head>
          <body>
            <h1>Unified Relational Framework <span>// Sims</span></h1>
            <p>Geometric derivation from the Reuleaux triangle — residual stress, pressure length, optical modes, and the cyclic shortfall.</p>
            <div class="btns">
              <a class="btn" href="URF_The_Instrument.html">The Instrument</a>
              <a class="btn secondary" href="URF_raytrace_shortfall.html">Ray Trace</a>
            </div>
            <div class="meta">
              Source: <a href="https://github.com/Zhenzheni/unified-relational-framework">Zhenzheni/unified-relational-framework</a>
            </div>
          </body>
          </html>
          EOF

          # Instrument (modular)
          cp sims/URF_The_Instrument.html _site/ 2>/dev/null || true
          cp sims/instrument.css _site/ 2>/dev/null || true
          cp sims/instrument.js _site/ 2>/dev/null || true

          # Raytrace — prefer single-file; also modular parts if present
          cp sims/URF_raytrace_shortfall.html _site/ 2>/dev/null || true
          cp sims/raytrace.css _site/ 2>/dev/null || true
          cp sims/raytrace.part1.js _site/ 2>/dev/null || true
          cp sims/raytrace.part2.js _site/ 2>/dev/null || true
          cp sims/raytrace.js _site/ 2>/dev/null || true

          echo "=== _site ==="
          ls -la _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
